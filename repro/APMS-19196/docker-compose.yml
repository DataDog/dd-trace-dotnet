services:
  # Minimal mock agent — accepts trace payloads and returns 200 OK.
  # This is needed so the tracer's DiscoveryService and transport don't error out.
  agent:
    image: nginx:alpine
    platform: linux/amd64
    volumes:
      - ./mock-agent.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8126"

  app:
    build: .
    platform: linux/amd64
    ports:
      - "5000:5000"
    depends_on:
      - agent
    environment:
      # Force full JIT so MoveNext is compiled with rewritten IL (stricter validation).
      - DOTNET_TieredCompilation=0
      - DOTNET_TC_QuickJitForLoops=0
      - DOTNET_ReadyToRun=0
