server {
    listen 8126;

    # Accept all trace/telemetry payloads — return 200 OK
    location / {
        default_type application/json;
        return 200 '{"rate_by_service":{}}';
    }

    # Discovery endpoint — the tracer's DiscoveryService hits GET /info
    # and parses the "endpoints" array to discover available features.
    # We advertise the debugger endpoints so Exception Replay transport works.
    location = /info {
        default_type application/json;
        return 200 '{"version":"mock-7.55.0","endpoints":["v0.4/traces","v0.7/config","debugger/v1/input","debugger/v2/input","debugger/v1/diagnostics","symdb/v1/input","v0.6/stats"],"client_drop_p0s":true,"span_meta_structs":false}';
    }

    # Debugger upload endpoints — accept and discard
    location /debugger/ {
        default_type application/json;
        return 200 '{}';
    }

    # RCM / config endpoint
    location = /v0.7/config {
        default_type application/json;
        return 200 '{"targets":""}';
    }
}
