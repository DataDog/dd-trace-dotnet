name: "Publish native debug symbols"
description: 'Publish native debug symbols'

# Datadog symbol-upload API keys are minted at runtime via dd-sts. The calling JOB must grant
# `permissions: id-token: write` — that cannot be set here. The dd-sts trust policies live in dd-source:
# domains/seceng/sit/apps/apis/dd-sts/config/policies/us1.ddbuild.io/dd-trace-dotnet-api-key-*.yaml

inputs:
  artifacts_path:
    description: "Path to the build artifacts"
    required: true

runs:
  using: "composite"
  steps:
    # Mint short-lived Datadog API keys per region via dd-sts
    # The trust policies live in dd-source:
    # domains/seceng/sit/apps/apis/dd-sts/config/policies/us1.ddbuild.io/dd-trace-dotnet-api-key-*.yaml
    - name: Get Datadog credentials (preprod)
      id: dd-sts-preprod
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-preprod

    - name: Get Datadog credentials (us1)
      id: dd-sts-us1
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-us1

    - name: Get Datadog credentials (us3)
      id: dd-sts-us3
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-us3

    - name: Get Datadog credentials (us5)
      id: dd-sts-us5
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-us5

    - name: Get Datadog credentials (eu1)
      id: dd-sts-eu1
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-eu1

    - name: Get Datadog credentials (ap1)
      id: dd-sts-ap1
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-ap1

    - name: Get Datadog credentials (ap2)
      id: dd-sts-ap2
      uses: DataDog/dd-sts-action@5a1b844d9b1224a1d53166fabf78871ff18c7f07 # v1.0.4
      with:
        policy: dd-trace-dotnet-api-key-ap2

    # datadog-ci needs the version 20 (https://github.com/DataDog/profiling-backend/blob/prod/debug-symbol-upload/Dockerfile#L6)
    - name: Install Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 20

    # Use the same go version as in https://github.com/DataDog/profiling-backend/blob/prod/debug-symbol-upload/Dockerfile#L21
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '^1.22.3'

    # Use the same version of datadog-ci as in https://github.com/DataDog/profiling-backend/blob/prod/debug-symbol-upload/Dockerfile#L14
    - name: Install datadog-ci
      shell: bash
      run: npm install -g @datadog/datadog-ci@3.15.0

    - name: Create debug symbols directory
      shell: bash
      run: |
        linux_artifact=${{inputs.artifacts_path}}/linux-native-symbols.tar.gz
        if [ ! -f $linux_artifact ]; then
          echo "Linux native symbols not found at $linux_artifact"
          exit 1
        fi

        windows_native_symbols=${{inputs.artifacts_path}}/windows-native-symbols.zip
        if [ ! -f $windows_native_symbols ]; then
          echo "Windows native symbols not found at $windows_native_symbols"
          exit 1
        fi

        windows_tracer_home=${{inputs.artifacts_path}}/windows-tracer-home.zip
        if [ ! -f $windows_tracer_home ]; then
          echo "Windows tracer home not found at $windows_tracer_home"
          exit 1
        fi

        export DEBUG_SYMBOLS_DIR="$GITHUB_WORKSPACE/debug_symbols"
        mkdir -p "$DEBUG_SYMBOLS_DIR"
        echo "DEBUG_SYMBOLS_DIR=$DEBUG_SYMBOLS_DIR" >> $GITHUB_ENV

        ## By splitting windows and linux symbols, we prevent trashing the logs
        ## Ex: when running datadog-ci for linux, it will report all PE files as non-ELF files.
        ##     when running datadog-ci for windows, it will report all ELF files as non-PE files.

        linux_subfolder="$DEBUG_SYMBOLS_DIR/linux"
        mkdir "$linux_subfolder"
        # Extract Linux symbols
        tar -zxvf $linux_artifact -C "$linux_subfolder"

        windows_subfolder="$DEBUG_SYMBOLS_DIR/windows"
        mkdir "$windows_subfolder"
        # Extract Windows symbols
        unzip -d "$windows_subfolder" $windows_native_symbols
        # Extract Windows tracer home
        unzip -d "$windows_subfolder" $windows_tracer_home

        # Remove all directories except the ones containing native symbols
        find "$windows_subfolder" -mindepth 1 -maxdepth 1 -type d \
          ! -name dd-dotnet-win-x64 \
          ! -name win-x64 \
          ! -name win-x86 \
          -exec rm -rf {} +

    - name: Push debug symbols
      shell: bash
      env:
        BOLD_GREEN: "\e[1;32m"
        RESET: "\e[0m"
        PREPROD_API_KEY: ${{ steps.dd-sts-preprod.outputs.api_key }}
        US1_API_KEY: ${{ steps.dd-sts-us1.outputs.api_key }}
        US3_API_KEY: ${{ steps.dd-sts-us3.outputs.api_key }}
        US5_API_KEY: ${{ steps.dd-sts-us5.outputs.api_key }}
        EU1_API_KEY: ${{ steps.dd-sts-eu1.outputs.api_key }}
        AP1_API_KEY: ${{ steps.dd-sts-ap1.outputs.api_key }}
        AP2_API_KEY: ${{ steps.dd-sts-ap2.outputs.api_key }}
      run: |
        for i in "datad0g.com ${{ inputs.preprod_api_key }}" "datadoghq.com ${{ inputs.us1_api_key }}" "us3.datadoghq.com ${{ inputs.us3_api_key }}" "us5.datadoghq.com ${{ inputs.us5_api_key }}" "datadoghq.eu ${{ inputs.eu1_api_key }}" "ap1.datadoghq.com ${{ inputs.ap1_api_key }}" "ap2.datadoghq.com ${{ inputs.ap2_api_key }}"; do
          site=$(echo $i | cut -d' ' -f1)
          api_key=$(echo $i | cut -d' ' -f2)
          echo -e "${BOLD_GREEN}Pushing symbols to $site${RESET}"
          DATADOG_API_KEY="$api_key" DATADOG_SITE="$site" DD_BETA_COMMANDS_ENABLED=1 datadog-ci elf-symbols upload "$DEBUG_SYMBOLS_DIR/linux"
          DATADOG_API_KEY="$api_key" DATADOG_SITE="$site" DD_BETA_COMMANDS_ENABLED=1 datadog-ci pe-symbols upload "$DEBUG_SYMBOLS_DIR/windows"
        done