name: Auto trigger AAS version bump

on:
  release:
    types: [published]

jobs:
  trigger_aas_release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for dd-octo-sts OIDC token

    steps:
      - name: Get GitHub Token via dd-octo-sts
        id: octo-sts
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/datadog-aas-extension
          policy: dd-trace-dotnet.github.trigger-aas-release

      - name: Trigger AAS release
        run: |
          curl -fX POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ steps.octo-sts.outputs.token }}" \
          https://api.github.com/repos/DataDog/datadog-aas-extension/dispatches \
          -d '{"event_type": "dd-trace-dotnet-release", "client_payload": {"is_prerelease":"${{github.event.release.prerelease}}", "version":"${{github.event.release.tag_name}}" } }'