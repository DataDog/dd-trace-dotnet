parameters:
  - name: 'framework'
    type: 'string'
  - name: 'includeMultiVersions'
    type: 'boolean'
    default: true

steps:
- task: DownloadPipelineArtifact@2
  displayName: "Download samples-standalone"
  inputs:
    buildType: 'specific'
    artifactName: samples-standalone
    targetPath: $(outputDir)/bin
    # Filter down to just the framework samples that we need, to reduce the size of the download
    # Assumes we always build in release mode (we should)
    patterns: |
      */release_${{ parameters.framework }}/**
      */release/**
    project: 'dd-trace-dotnet'
    definition: 54
    buildVersionToDownload: 'specific'
    pipelineId: 202197

- ${{ if eq(parameters.includeMultiVersions, true) }}:
  - task: DownloadPipelineArtifact@2
    displayName: "Download samples-multi-version-${{ parameters.framework }}"
    retryCountOnTaskFailure: 5
    inputs:
      buildType: 'specific'
      artifactName: samples-multi-version-${{ parameters.framework }}
      targetPath: $(outputDir)/publish
      project: 'dd-trace-dotnet'
      definition: 54
      buildVersionToDownload: 'specific'
      pipelineId: 202197
