parameters:
  - name: timeoutSeconds
    type: number
    default: 300
  - name: maxRestarts
    type: number
    default: 3

steps:
- bash: |
    set -euo pipefail
    ./.azure-pipelines/steps/ensure-docker-ready-linux.sh
  displayName: Ensure Docker daemon is ready (Linux)
  condition: ne(variables['Agent.OS'], 'Windows_NT')
  env:
    DOCKER_READY_TIMEOUT_SECONDS: ${{ parameters.timeoutSeconds }}
    DOCKER_MAX_RESTARTS: ${{ parameters.maxRestarts }}

- powershell: |
    # Prevent PowerShell from treating native command stderr as a terminating error
    $ErrorActionPreference = 'Continue'

    $timeout = ${{ parameters.timeoutSeconds }}
    $maxRestarts = ${{ parameters.maxRestarts }}
    $interval = 10
    $elapsed = 0
    $restartCount = 0

    Write-Host "Waiting up to ${timeout}s for Docker daemon (will attempt up to ${maxRestarts} service restarts)..."

    # Log initial service state for diagnostics
    $svc = Get-Service docker -ErrorAction SilentlyContinue
    if ($svc) {
        Write-Host "Docker service initial state: $($svc.Status)"
    } else {
        Write-Host "##vso[task.logissue type=error]Docker service not found on this agent"
        exit 1
    }

    while ($elapsed -lt $timeout) {
        # Check if Docker responds (suppress stderr to avoid NativeCommandError)
        $null = docker version 2>&1
        if ($LASTEXITCODE -eq 0) {
            Write-Host "Docker daemon is ready (waited ${elapsed}s, ${restartCount} restart(s) performed)"
            docker info
            exit 0
        }

        # If the service is not running, attempt a restart
        $svc = Get-Service docker -ErrorAction SilentlyContinue
        if ($svc -and $svc.Status -ne 'Running') {
            if ($restartCount -lt $maxRestarts) {
                $restartCount++
                Write-Host "Docker service is $($svc.Status). Attempting restart ${restartCount}/${maxRestarts}..."
                try {
                    Restart-Service docker -Force -ErrorAction Stop
                    Write-Host "Restart-Service completed, waiting for daemon to initialize..."
                } catch {
                    Write-Host "##vso[task.logissue type=warning]Restart-Service failed: $_"
                }
            } else {
                Write-Host "##vso[task.logissue type=warning]Docker service is $($svc.Status) but max restarts (${maxRestarts}) exhausted"
            }
        }

        Write-Host "Docker not ready yet (${elapsed}s elapsed, service: $($svc.Status)), retrying in ${interval}s..."
        Start-Sleep -Seconds $interval
        $elapsed += $interval
    }

    # Final diagnostics before failing
    Write-Host "--- Final diagnostics ---"
    Get-Service docker | Format-List *
    Get-EventLog -LogName Application -Source 'docker' -Newest 20 -ErrorAction SilentlyContinue | Format-Table TimeGenerated, EntryType, Message -AutoSize

    Write-Host "##vso[task.logissue type=error]Docker daemon did not become ready within ${timeout}s after ${restartCount} restart(s)"
    exit 1
  displayName: Ensure Docker daemon is ready
  condition: eq(variables['Agent.OS'], 'Windows_NT')
