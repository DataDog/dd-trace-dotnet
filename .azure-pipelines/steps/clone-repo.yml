parameters:
  - name: targetShaId
    type: string

  - name: targetBranch
    type: string

  - name: shallowFetch
    type: boolean
    default: false

steps:
- ${{ if endsWith(variables['build.sourceBranch'], '/merge') }}:
  - checkout: none
  - bash: |
      # Constants
      RETRY_INTERVAL=10
      MAX_ATTEMPTS=3
      
      # Azure devops _doesn't_ clean up the contents of the repo after the pipeline has finished
      # So we do it manually
      echo "Cleaning $BUILD_REPOSITORY_LOCALPATH/ directory"
      # This deletes everything in the folder, including hidden `.` folders
      sudo find $BUILD_REPOSITORY_LOCALPATH/. -name . -o -prune -exec rm -rf -- {} +

      # As this is a pull request, we need to do a fake merge
      # uses similar process to existing checkout task
      prBranch=$SYSTEM_PULLREQUEST_SOURCEBRANCH
      echo "Checking out merge commit for ${{ parameters.targetShaId }} and $prBranch"
      git version
      git lfs version
      echo "Initializing repository at $BUILD_REPOSITORY_LOCALPATH ..."
      git init "$BUILD_REPOSITORY_LOCALPATH"
      echo "Adding remote $BUILD_REPOSITORY_URI ..."
      git remote add origin "$BUILD_REPOSITORY_URI"
      git config gc.auto 0
      git config http.retry $(GIT_HTTP_RETRY)
      git config http.retryDelay $(GIT_HTTP_RETRY_DELAY)
      git config --get-all http.$BUILD_REPOSITORY_URI.extraheader
      git config --get-all http.extraheader
      git config --get-regexp .*extraheader
      git config --get-all http.proxy
      git config http.version HTTP/1.1

      # Attempt fetching and checking out
      for attempt in $(seq 1 $MAX_ATTEMPTS)
      do
        echo "Attempt $attempt/$MAX_ATTEMPTS: Fetching and checking out: ${{ parameters.targetBranch }} and $prBranch"
        git fetch --force --tags --prune --prune-tags --progress --no-recurse-submodules origin +refs/heads/${{ parameters.targetBranch }}:refs/remotes/origin/${{ parameters.targetBranch }} +refs/heads/$prBranch:refs/remotes/origin/$prBranch && git checkout --force $prBranch && break

        if [ $attempt -lt $MAX_ATTEMPTS ]; then
          echo "Fetch and checkout failed, retrying in $RETRY_INTERVAL seconds"
          sleep $RETRY_INTERVAL
        else
          echo "All attempts to fetch and checkout failed"
          exit 1
        fi
      done
      
      echo "Resetting $prBranch to origin/$prBranch ..."
      git reset origin/$prBranch --hard
      echo "Running git clean -ffdx ..."
      git clean -ffdx
    displayName: checkout
    condition: and(succeeded(), not(eq(variables['Agent.OS'], 'Windows_NT')))

  - bash: |
      echo "Updating credentials ..."
      git config user.email "gitfun@example.com"
      git config user.name "Automatic Merge"

      prBranch=$SYSTEM_PULLREQUEST_SOURCEBRANCH
      echo "Merging $prBranch with ${{ parameters.targetShaId }} ..."
      git merge ${{ parameters.targetShaId }}
      
      mergeInProgress=$?
      if [ $mergeInProgress -ne 0 ]
      then
        echo "Merge failed, rolling back ..."
        git merge --abort
        exit 1;
      fi

      echo "Merge successful"
      git status
    displayName: merge
    condition: and(succeeded(), not(eq(variables['Agent.OS'], 'Windows_NT')))

  - powershell: |
      echo "Cleaning up source directories ..."
      $localPath=$env:BUILD_REPOSITORY_LOCALPATH
      rm $localPath/* -r -fo -Exclude ".git"

      # As this is a pull request, we need to do a fake merge
      # uses similar process to existing checkout task
      $prBranch=$env:SYSTEM_PULLREQUEST_SOURCEBRANCH
      echo "Checking out merge commit for ${{ parameters.targetShaId }} and $prBranch"
      echo "Checking out merge commit for ${{ parameters.targetShaId }} and $prBranch"
      git version
      # Disabled in the windows version
      # git lfs version 

      echo "Initializing repository at $localPath ..."
      git init --initial-branch=${{ parameters.targetBranch }} "$localPath"

      cd $localPath

      $repoUri=$env:BUILD_REPOSITORY_URI
      echo "Adding remote $repoUri ..."
      git remote add origin "$repoUri"

      git config gc.auto 0
      git config http.retry $(GIT_HTTP_RETRY)
      git config http.retryDelay $(GIT_HTTP_RETRY_DELAY)
      git config --get-all http.$repoUri.extraheader
      git config --get-all http.extraheader
      git config --get-regexp .*extraheader
      git config --get-all http.proxy
      git config http.version HTTP/1.1

      echo "Force fetching ${{ parameters.targetBranch }} and $prBranch ..."
      echo "git fetch --force --tags --prune --prune-tags --progress --no-recurse-submodules origin +refs/heads/${{ parameters.targetBranch }}:refs/remotes/origin/${{ parameters.targetBranch }} +refs/heads/${prBranch}:refs/remotes/origin/${prBranch}"
      git fetch --force --tags --prune --prune-tags --progress --no-recurse-submodules origin +refs/heads/${{ parameters.targetBranch }}:refs/remotes/origin/${{ parameters.targetBranch }} +refs/heads/${prBranch}:refs/remotes/origin/${prBranch}

      echo "Checking out $prBranch..."
      git checkout --force $prBranch

      echo "Resetting $prBranch to origin/$prBranch ..."
      git reset origin/$prBranch --hard
      echo "Running git clean -ffdx ..."
      git clean -ffdx
    displayName: checkout
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))

  - powershell: |
      echo "Updating credentials ..."
      git config user.email "gitfun@example.com"
      git config user.name "Automatic Merge"
      $prBranch=$env:SYSTEM_PULLREQUEST_SOURCEBRANCH

      echo "Merging $prBranch with ${{ parameters.targetShaId }} ..."
      git merge ${{ parameters.targetShaId }}

      $mergeInProgress=$LASTEXITCODE
      if("$mergeInProgress" -ne "0") {
        echo "Merge failed, rolling back ..."
        git merge --abort
        exit 1;
      }

      echo "Merge successful"
      git status
    displayName: merge
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))

- ${{ else }}:
    # The clean doesn't always work, so sudo rm -rf it
  - bash: |
      echo "Cleaning $BUILD_REPOSITORY_LOCALPATH/ directory"
      # This deletes everything in the folder _except the .git folder
      # Deleting the git folder causes weird issues with git lfs
      sudo find $BUILD_REPOSITORY_LOCALPATH/. -name . -o -prune -exec rm -rf -- {} +
    displayName: clean
    condition: and(succeeded(), not(eq(variables['Agent.OS'], 'Windows_NT')))

  - powershell: rm "$env:BUILD_REPOSITORY_LOCALPATH/*" -r -fo -Exclude ".git"
    displayName: clean
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))

  - ${{ if eq(parameters.shallowFetch, true) }}:
    - checkout: none

    - bash: |
        set -eo pipefail

        localPath="$BUILD_REPOSITORY_LOCALPATH"
        sparseDirectories=(
          .azure-pipelines
          .gitlab
          .nuke
          tracer/build/_build
          tracer/build/smoke_test_snapshots
          tracer/test/test-applications/regression/AspNetCoreSmokeTest
        )

        git init "$localPath"
        git -C "$localPath" config core.repositoryFormatVersion 1
        git -C "$localPath" config extensions.partialClone origin
        git -C "$localPath" config gc.auto 0
        git -C "$localPath" config http.version HTTP/1.1

        if git -C "$localPath" remote get-url origin >/dev/null 2>&1; then
          git -C "$localPath" remote set-url origin "$BUILD_REPOSITORY_URI"
        else
          git -C "$localPath" remote add origin "$BUILD_REPOSITORY_URI"
        fi

        git -C "$localPath" config remote.origin.promisor true
        git -C "$localPath" config remote.origin.partialCloneFilter tree:0

        git -C "$localPath" sparse-checkout init --cone
        git -C "$localPath" sparse-checkout set "${sparseDirectories[@]}"

        fetchSucceeded=false
        for attempt in 1 2 3; do
          echo "Fetch attempt $attempt/3"
          if git -C "$localPath" fetch --force --no-tags --depth=1 --filter=tree:0 origin "$BUILD_SOURCEVERSION"; then
            fetchSucceeded=true
            break
          fi

          if [ "$attempt" -lt 3 ]; then
            sleep $((attempt * 5))
          fi
        done

        if [ "$fetchSucceeded" != true ]; then
          echo "Failed to fetch $BUILD_SOURCEVERSION after 3 attempts"
          exit 1
        fi

        git -C "$localPath" checkout --force --detach FETCH_HEAD
        test "$(git -C "$localPath" rev-parse HEAD)" = "$BUILD_SOURCEVERSION"
      displayName: sparse checkout
      condition: and(succeeded(), not(eq(variables['Agent.OS'], 'Windows_NT')))

    - powershell: |
        $ErrorActionPreference = "Stop"

        function Invoke-Git {
          & git @args
          if ($LASTEXITCODE -ne 0) {
            throw "git $args failed with exit code $LASTEXITCODE"
          }
        }

        $localPath=$env:BUILD_REPOSITORY_LOCALPATH
        $sparseDirectories = @(
          ".azure-pipelines",
          ".gitlab",
          ".nuke",
          "tracer/build/_build",
          "tracer/build/smoke_test_snapshots",
          "tracer/test/test-applications/regression/AspNetCoreSmokeTest"
        )

        Invoke-Git init "$localPath"
        Invoke-Git -C "$localPath" config core.repositoryFormatVersion 1
        Invoke-Git -C "$localPath" config extensions.partialClone origin
        Invoke-Git -C "$localPath" config gc.auto 0
        Invoke-Git -C "$localPath" config http.version HTTP/1.1

        $originUrl = & git -C "$localPath" config --get remote.origin.url
        if ($LASTEXITCODE -eq 0) {
          Invoke-Git -C "$localPath" remote set-url origin "$env:BUILD_REPOSITORY_URI"
        } else {
          Invoke-Git -C "$localPath" remote add origin "$env:BUILD_REPOSITORY_URI"
        }

        Invoke-Git -C "$localPath" config remote.origin.promisor true
        Invoke-Git -C "$localPath" config remote.origin.partialCloneFilter tree:0

        Invoke-Git -C "$localPath" sparse-checkout init --cone
        & git -C "$localPath" sparse-checkout set @sparseDirectories
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to configure sparse checkout"
        }

        $fetchSucceeded = $false
        for ($attempt = 1; $attempt -le 3; $attempt++) {
          Write-Host "Fetch attempt $attempt/3"
          & git -C "$localPath" fetch --force --no-tags --depth=1 --filter=tree:0 origin "$env:BUILD_SOURCEVERSION"
          if ($LASTEXITCODE -eq 0) {
            $fetchSucceeded = $true
            break
          }

          if ($attempt -lt 3) {
            Start-Sleep -Seconds ($attempt * 5)
          }
        }

        if (-not $fetchSucceeded) {
          throw "Failed to fetch $env:BUILD_SOURCEVERSION after 3 attempts"
        }

        Invoke-Git -C "$localPath" checkout --force --detach FETCH_HEAD
        $actualSha = Invoke-Git -C "$localPath" rev-parse HEAD
        if ($actualSha.Trim() -ne $env:BUILD_SOURCEVERSION) {
          throw "Checked out $actualSha instead of $env:BUILD_SOURCEVERSION"
        }
      displayName: sparse checkout
      condition: and(succeeded(), eq(variables['Agent.OS'], 'Windows_NT'))

  - ${{ else }}:
    - checkout: self
      clean: true
