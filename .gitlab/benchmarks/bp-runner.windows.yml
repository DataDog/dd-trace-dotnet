# bp-runner configuration for dd-trace-dotnet microbenchmarks
#
# This file controls how benchmarks are executed on Windows ephemeral instances.
# The run_microbenchmarks template handles:
# - Cloning the repo (candidate to C:\app\candidate, baseline to C:\app\baseline)
# - Running the benchmarks via how_to_run_benchmarks script
#
# Environment variables available:
# - $env:CODE_SRC: Path to cloned repo (set by bp-runner)
# - $env:BASELINE_OR_CANDIDATE: "candidate" or "baseline"
# - $env:PARALLEL_ITEM: Benchmark filter pattern for this parallel run
# - $env:PARALLEL_INDEX: 0-based index of this parallel run

.how_to_fetch_release_build: &how_to_fetch_release_build |
  $ErrorActionPreference = "Stop"

  Write-Output "=== Fetching release for $env:BASELINE_OR_CANDIDATE ==="
  Write-Output "CODE_SRC: $env:CODE_SRC"
  Write-Output "BRANCH: $env:BRANCH"
  Write-Output "COMMIT_SHA: $env:COMMIT_SHA"

  # Clone the repository
  if (Test-Path $env:CODE_SRC) {
      Remove-Item -Recurse -Force $env:CODE_SRC
  }
  New-Item -ItemType Directory -Path $env:CODE_SRC -Force | Out-Null

  Write-Output "Cloning $env:REPO at $env:COMMIT_SHA..."
  if ($env:GITHUB_TOKEN) {
      git clone "https://x-access-token:$env:GITHUB_TOKEN@github.com/$env:REPO.git" $env:CODE_SRC
  } else {
      git clone "https://github.com/$env:REPO.git" $env:CODE_SRC
  }

  Set-Location $env:CODE_SRC
  git checkout $env:COMMIT_SHA

  # Add dotnet to PATH (installed at C:\dotnet on the AMI)
  [Environment]::SetEnvironmentVariable("PATH", "C:\dotnet;" + [Environment]::GetEnvironmentVariable("PATH", [EnvironmentVariableTarget]::Process), [EnvironmentVariableTarget]::Process)

  # Build the tracer and benchmarks using Nuke targets
  # BuildTracerHome: builds the tracer (required for benchmarks to reference)
  # BuildBenchmarks: builds all benchmark projects (so parallel runs can use --no-benchmark-build)
  Write-Output "Building tracer and benchmarks using Nuke..."
  Set-Location "$env:CODE_SRC\tracer"
  & .\build.cmd BuildTracerHome BuildBenchmarks

  # Signal that build is complete by creating a marker file
  $markerPath = "$env:CODE_SRC\tracer\.build-complete"
  New-Item -ItemType File -Path $markerPath -Force | Out-Null
  Write-Output "Build complete marker created at: $markerPath"

  Write-Output "=== Fetch and build complete for $env:BASELINE_OR_CANDIDATE ==="

.how_to_fetch_release_wait: &how_to_fetch_release_wait |
  $ErrorActionPreference = "Stop"

  Write-Output "=== Waiting for build to complete for $env:BASELINE_OR_CANDIDATE ==="
  Write-Output "CODE_SRC: $env:CODE_SRC"

  # Both experiments share the same CODE_SRC (C:\app\candidate or C:\app\baseline).
  # batch-1 does the actual build, batch-2 just waits for it to finish.
  $markerPath = "$env:CODE_SRC\tracer\.build-complete"

  Write-Output "Waiting for build marker at: $markerPath"

  # Wait for the marker file (timeout after 30 minutes)
  $timeout = 1800
  $elapsed = 0
  $interval = 5
  while (-not (Test-Path $markerPath)) {
      if ($elapsed -ge $timeout) {
          Write-Error "Timeout waiting for build to complete"
          exit 1
      }
      Write-Output "Waiting for build... ($elapsed seconds elapsed)"
      Start-Sleep -Seconds $interval
      $elapsed += $interval
  }

  Write-Output "Build complete marker found. Using shared CODE_SRC: $env:CODE_SRC"
  Write-Output "=== Wait complete for $env:BASELINE_OR_CANDIDATE ==="

.how_to_run_benchmarks_batch1: &how_to_run_benchmarks_batch1 |
  $ErrorActionPreference = "Stop"

  $env:BENCHMARK_PROJECT = "Benchmarks.Trace"
  $env:BENCHMARK_CATEGORY = "prs"
  if ($env:CI_COMMIT_REF_NAME -eq "master") {
    $env:BENCHMARK_CATEGORY = "master"
  }

  # Prefix index with "b1-" to avoid collision with batch-2
  $artifactsIndex = "b1-$env:PARALLEL_INDEX"

  Write-Output "=== Running benchmarks ==="
  Write-Output "BASELINE_OR_CANDIDATE: $env:BASELINE_OR_CANDIDATE"
  Write-Output "CODE_SRC: $env:CODE_SRC"
  Write-Output "PARALLEL_ITEM: $env:PARALLEL_ITEM"
  Write-Output "BENCHMARK_PROJECT: $env:BENCHMARK_PROJECT"
  Write-Output "BENCHMARK_CATEGORY: $env:BENCHMARK_CATEGORY"
  Write-Output "PARALLEL_INDEX: $env:PARALLEL_INDEX"
  Write-Output "ARTIFACTS_INDEX: $artifactsIndex"
  Write-Output "ARTIFACTS_DIR: $env:ARTIFACTS_DIR"

  # Add dotnet to PATH
  [Environment]::SetEnvironmentVariable("PATH", "C:\dotnet;" + [Environment]::GetEnvironmentVariable("PATH", [EnvironmentVariableTarget]::Process), [EnvironmentVariableTarget]::Process)

  # Run benchmarks - each parallel run gets unique artifacts dir via prefixed index
  & "$env:CODE_SRC\.gitlab\benchmarks\scripts\run-benchmarks.ps1" `
    -Filter "$env:PARALLEL_ITEM" `
    -ArtifactsIndex "$artifactsIndex"

  Write-Output "=== Benchmarks completed for filter: $env:PARALLEL_ITEM ==="

.how_to_run_benchmarks_batch2: &how_to_run_benchmarks_batch2 |
  $ErrorActionPreference = "Stop"

  $env:BENCHMARK_PROJECT = "Benchmarks.Trace"
  $env:BENCHMARK_CATEGORY = "prs"
  if ($env:CI_COMMIT_REF_NAME -eq "master") {
    $env:BENCHMARK_CATEGORY = "master"
  }

  # Prefix index with "b2-" to avoid collision with batch-1
  $artifactsIndex = "b2-$env:PARALLEL_INDEX"

  Write-Output "=== Running benchmarks ==="
  Write-Output "BASELINE_OR_CANDIDATE: $env:BASELINE_OR_CANDIDATE"
  Write-Output "CODE_SRC: $env:CODE_SRC"
  Write-Output "PARALLEL_ITEM: $env:PARALLEL_ITEM"
  Write-Output "BENCHMARK_PROJECT: $env:BENCHMARK_PROJECT"
  Write-Output "BENCHMARK_CATEGORY: $env:BENCHMARK_CATEGORY"
  Write-Output "PARALLEL_INDEX: $env:PARALLEL_INDEX"
  Write-Output "ARTIFACTS_INDEX: $artifactsIndex"
  Write-Output "ARTIFACTS_DIR: $env:ARTIFACTS_DIR"

  # Add dotnet to PATH
  [Environment]::SetEnvironmentVariable("PATH", "C:\dotnet;" + [Environment]::GetEnvironmentVariable("PATH", [EnvironmentVariableTarget]::Process), [EnvironmentVariableTarget]::Process)

  # Run benchmarks - each parallel run gets unique artifacts dir via prefixed index
  & "$env:CODE_SRC\.gitlab\benchmarks\scripts\run-benchmarks.ps1" `
    -Filter "$env:PARALLEL_ITEM" `
    -ArtifactsIndex "$artifactsIndex"

  Write-Output "=== Benchmarks completed for filter: $env:PARALLEL_ITEM ==="

# Run experiments in parallel (each on different NUMA node)
parallelize: true

# Benchmarks are split into two batches:
# - batch-1: STABLE benchmarks (200ms iteration time, fast, low variance)
# - batch-2: FLAKY benchmarks (500ms iteration time, need isolation)
#
# This separation reduces memory contention between flaky benchmarks.

experiments:
  - name: batch-1
    steps:
      - name: batch-1
        run: run_microbenchmarks
        repo: DataDog/dd-trace-dotnet
        baseline_branch: ""

        cpus: "0,0xFFFFF"
        parallelize:
          # STABLE benchmarks (200ms iteration time, 0% FP rate)
          items: >-
            *ActivityBenchmark*
            *AppSecBodyBenchmark*
            *AppSecWafBenchmark*
            *DbCommandBenchmark*
            *HttpClientBenchmark*
            *ILoggerBenchmark*
            *NLogBenchmark*
            *RedisBenchmark*
            *SpanBenchmark*
            *TraceAnnotationsBenchmark*
          cpus_per_item: 2

        how_to_fetch_release: *how_to_fetch_release_build
        how_to_run_benchmarks: *how_to_run_benchmarks_batch1

  - name: batch-2
    steps:
      - name: batch-2
        run: run_microbenchmarks
        repo: DataDog/dd-trace-dotnet
        baseline_branch: ""

        cpus: "1,0xFFFFF"
        parallelize:
          # FLAKY benchmarks (500ms iteration time, need isolation)
          items: >-
            *AgentWriterBenchmark*
            *AppSecEncoderBenchmark*
            *AspNetCoreBenchmark*
            *CharSliceBenchmark*
            *CIVisibilityProtocolWriterBenchmark*
            *ElasticsearchBenchmark*
            *GraphQLBenchmark*
            *Log4netBenchmark*
            *SerilogBenchmark*
            *StringAspectsBenchmark*
          cpus_per_item: 2

        how_to_fetch_release: *how_to_fetch_release_wait
        how_to_run_benchmarks: *how_to_run_benchmarks_batch2
