# Instance provision file for running dd-trace-dotnet microbenchmarks
#
# This file is used by bp-infra to provision a Windows instance and run benchmarks.
# The bp-runner template handles cloning the repo, so we only need to:
# 1. Verify the CPU model (for reproducibility)
# 2. Run bp-runner with the benchmark config

name: &provision_name "dd-trace-dotnet-microbenchmarks"

init_environment:
  # S3 bucket for benchmark results
  BP_INFRA_ARTIFACTS_BUCKET_NAME: "windows-benchmarking-results-us-east-1"

source_ami:
  ami_id_ssm_parameter: "/windows-benchmarking/dd-trace-dotnet-microbenchmarks-ami-id"

tags:
  Name: *provision_name

provision_steps:
  - check_cpu_model
  - run_benchmarks
  - upload_results

check_cpu_model:
  remote_command: |
    $ErrorActionPreference = "Stop"
    $cpuModel = (Get-WmiObject -Class Win32_Processor).Name
    if ($cpuModel -notlike "*8259CL CPU*") {
        Write-Error "CPU model is not Intel(R) Xeon(R) Platinum 8259CL: $cpuModel"
        exit 1
    }
    Write-Output "CPU model verified: Intel(R) Xeon(R) Platinum 8259CL"

run_benchmarks:
  populate_env: true
  remote_command: |
    $ErrorActionPreference = "Stop"

    # DD_API_KEY is passed from the CI job via --env-regex

    # Clone dd-trace-dotnet to get the bp-runner config
    $branch = if ($env:CI_COMMIT_REF_NAME) { $env:CI_COMMIT_REF_NAME } else { "master" }
    $repoDir = "C:\app\dd-trace-dotnet-config"

    Write-Output "Cloning dd-trace-dotnet (branch: $branch) to get bp-runner config..."
    if ($env:GITHUB_TOKEN) {
        git clone -b $branch --single-branch --depth 1 "https://x-access-token:$env:GITHUB_TOKEN@github.com/DataDog/dd-trace-dotnet.git" $repoDir
    } else {
        git clone -b $branch --single-branch --depth 1 "https://github.com/DataDog/dd-trace-dotnet.git" $repoDir
    }

    # Set ARTIFACTS_DIR for bp-runner output
    $env:ARTIFACTS_DIR = "C:\artifacts"
    New-Item -ItemType Directory -Path $env:ARTIFACTS_DIR -Force | Out-Null

    # Run bp-runner with the benchmark config
    # bp-runner will handle cloning the repo for benchmarks into C:\app\candidate
    Write-Output "Running bp-runner..."
    Set-Location $repoDir
    bp-runner .gitlab\benchmarks\bp-runner.windows.yml --debug

upload_results:
  populate_env: true
  remote_command: |
    $ErrorActionPreference = "Stop"

    $artifactsDir = "C:\artifacts"
    $s3Bucket = $env:BP_INFRA_ARTIFACTS_BUCKET_NAME
    $s3Prefix = "$env:CI_PROJECT_NAME/$env:CI_COMMIT_REF_NAME/$env:CI_JOB_ID/reports"

    Write-Output "=== Uploading benchmark results to S3 ==="
    Write-Output "Artifacts directory: $artifactsDir"
    Write-Output "S3 destination: s3://$s3Bucket/$s3Prefix"

    # List files to upload
    $files = Get-ChildItem -Path $artifactsDir -Filter "*.json" -ErrorAction SilentlyContinue
    if ($files) {
        Write-Output "Found $($files.Count) JSON files to upload"
        foreach ($file in $files) {
            Write-Output "  - $($file.Name)"
        }

        # Upload to S3 using AWS PowerShell module
        Write-S3Object `
            -BucketName $s3Bucket `
            -KeyPrefix $s3Prefix `
            -Folder $artifactsDir `
            -CannedACLName "bucket-owner-full-control" `
            -Recurse

        Write-Output "Upload complete!"

        # Also update _latest if on master branch
        if ($env:CI_COMMIT_REF_NAME -eq "master") {
            $latestPrefix = "$env:CI_PROJECT_NAME/_latest"
            Write-Output "Updating latest master results at s3://$s3Bucket/$latestPrefix"
            Write-S3Object `
                -BucketName $s3Bucket `
                -KeyPrefix $latestPrefix `
                -Folder $artifactsDir `
                -CannedACLName "bucket-owner-full-control" `
                -Recurse
        }
    } else {
        Write-Warning "No JSON files found in $artifactsDir"
        Get-ChildItem -Path $artifactsDir -Recurse | ForEach-Object { Write-Output $_.FullName }
    }
