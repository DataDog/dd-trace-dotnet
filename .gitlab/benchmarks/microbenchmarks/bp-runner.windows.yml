# bp-runner config for dd-trace-dotnet microbenchmarks on Windows.
#
# Three experiments run in parallel:
#   - trace-0: Benchmarks.Trace (9 benchmarks) on NUMA node 0, cores 0-17
#   - trace-1: Benchmarks.Trace (11 benchmarks) on NUMA node 1, cores 0-21
#   - otel:    OpenTelemetry benchmarks on NUMA node 0, cores 18-23
#              Step 1: InstrumentedApi (always), Step 2: Api (master only, after InstrumentedApi finishes)
#
# trace-0 clones and builds; others wait for .build-complete marker file.
# Artifact dirs are prefixed with batch name to avoid collisions.
#
# Each benchmark item gets 2 CPUs. We empirically verified noise was too high for .NET 6.0 on single CPUs.
#
# bp-runner uses the "run: run_microbenchmarks" template on each "experiment step". 
# This template orchestrates running microbenchmarks in parallel. It requires the following fields:
#   - how_to_fetch_release: script to clone/build the repo for baseline/candidate
#   - how_to_run_benchmarks: script invoked for each parallel item
#   - cpus: CPU affinity mask for NUMA node isolation
#   - parallelize.items: benchmark filters, each run in parallel within the batch
#
#
# YAML anchors (&name/*name) define reusable script blocks referenced below.

.how_to_fetch_release_build: &how_to_fetch_release_build |
  $ErrorActionPreference = "Stop"

  Write-Output "=== Fetching release for $env:BASELINE_OR_CANDIDATE ==="
  Write-Output "CODE_SRC: $env:CODE_SRC"
  Write-Output "BRANCH: $env:BRANCH"
  Write-Output "COMMIT_SHA: $env:COMMIT_SHA"

  # Clone the repository
  if (Test-Path $env:CODE_SRC) {
      Remove-Item -Recurse -Force $env:CODE_SRC
  }
  New-Item -ItemType Directory -Path $env:CODE_SRC -Force | Out-Null

  Write-Output "Cloning $env:REPO at $env:COMMIT_SHA..."
  if ($env:GITHUB_TOKEN) {
      git clone "https://x-access-token:$env:GITHUB_TOKEN@github.com/$env:REPO.git" $env:CODE_SRC
  } else {
      git clone "https://github.com/$env:REPO.git" $env:CODE_SRC
  }

  Set-Location $env:CODE_SRC
  git checkout $env:COMMIT_SHA

  # Add dotnet to PATH (installed at C:\dotnet on the AMI)
  [Environment]::SetEnvironmentVariable("PATH", "C:\dotnet;" + [Environment]::GetEnvironmentVariable("PATH", [EnvironmentVariableTarget]::Process), [EnvironmentVariableTarget]::Process)

  # Build the tracer and benchmarks using Nuke targets
  # BuildTracerHome: builds the tracer (required for benchmarks to reference)
  # BuildBenchmarks: builds all benchmark projects (so parallel runs use pre-built binaries directly)
  Write-Output "Building tracer and benchmarks using Nuke..."
  Set-Location "$env:CODE_SRC\tracer"
  & .\build.cmd BuildTracerHome BuildBenchmarks

  # Signal that build is complete by creating a marker file
  $markerPath = "$env:CODE_SRC\tracer\.build-complete"
  New-Item -ItemType File -Path $markerPath -Force | Out-Null
  Write-Output "Build complete marker created at: $markerPath"

  Write-Output "=== Fetch and build complete for $env:BASELINE_OR_CANDIDATE ==="

.how_to_fetch_release_wait: &how_to_fetch_release_wait |
  $ErrorActionPreference = "Stop"

  Write-Output "=== Waiting for build to complete for $env:BASELINE_OR_CANDIDATE ==="
  Write-Output "CODE_SRC: $env:CODE_SRC"

  # All experiments share the same CODE_SRC (C:\app\candidate or C:\app\baseline).
  # trace batch does the actual build, others wait for it to finish.
  $markerPath = "$env:CODE_SRC\tracer\.build-complete"

  Write-Output "Waiting for build marker at: $markerPath"

  # Wait for the marker file (timeout after 30 minutes)
  $timeout = 1800
  $elapsed = 0
  $interval = 5
  while (-not (Test-Path $markerPath)) {
      if ($elapsed -ge $timeout) {
          Write-Error "Timeout waiting for build to complete"
          exit 1
      }
      Write-Output "Waiting for build... ($elapsed seconds elapsed)"
      Start-Sleep -Seconds $interval
      $elapsed += $interval
  }

  Write-Output "Build complete marker found. Using shared CODE_SRC: $env:CODE_SRC"
  Write-Output "=== Wait complete for $env:BASELINE_OR_CANDIDATE ==="

.how_to_run_benchmarks: &how_to_run_benchmarks |
  $ErrorActionPreference = "Stop"

  # Skip if benchmark project DLL not built.
  # Some projects (e.g., Benchmarks.OpenTelemetry.Api) are not built on PRs. See Build.cs GetBenchmarkProjectsWithSettings().
  $dllPattern = "$env:CODE_SRC\tracer\test\benchmarks\$env:BENCHMARK_PROJECT\bin\Release\*\$env:BENCHMARK_PROJECT.dll"
  if (-not (Test-Path $dllPattern)) {
    Write-Output "Skipping: $env:BENCHMARK_PROJECT not built (DLL not found matching $dllPattern)"
    exit 0
  }

  # BATCH_PREFIX set via env: in experiment step (e.g., "trace" or "otel-api"). We need different prefixes to avoid race conditions.
  $artifactsIndex = "$env:BATCH_PREFIX-$env:PARALLEL_INDEX"

  # Benchmark category filters which benchmarks run via BenchmarkDotNet's --allCategories flag.
  # Benchmarks are tagged with [BenchmarkCategory("prs")] or [BenchmarkCategory("master")] attributes.
  $category = if ($env:CI_COMMIT_REF_NAME -eq "master") { "master" } else { "prs" }

  Write-Output "=== Running benchmarks ==="
  Write-Output "BASELINE_OR_CANDIDATE: $env:BASELINE_OR_CANDIDATE"
  Write-Output "CODE_SRC: $env:CODE_SRC"
  Write-Output "PARALLEL_ITEM: $env:PARALLEL_ITEM"
  Write-Output "BENCHMARK_PROJECT: $env:BENCHMARK_PROJECT"
  Write-Output "BENCHMARK_CATEGORY: $category"
  Write-Output "PARALLEL_INDEX: $env:PARALLEL_INDEX"
  Write-Output "ARTIFACTS_INDEX: $artifactsIndex"
  Write-Output "ARTIFACTS_DIR: $env:ARTIFACTS_DIR"

  # Add dotnet to PATH
  [Environment]::SetEnvironmentVariable("PATH", "C:\dotnet;" + [Environment]::GetEnvironmentVariable("PATH", [EnvironmentVariableTarget]::Process), [EnvironmentVariableTarget]::Process)

  # Run benchmarks - each parallel run gets unique artifacts dir via prefixed index
  & "$env:CODE_SRC\.gitlab\benchmarks\microbenchmarks\scripts\run-benchmarks.ps1" `
    -Filter "$env:PARALLEL_ITEM" `
    -ArtifactsIndex "$artifactsIndex" `
    -Project "$env:BENCHMARK_PROJECT" `
    -Category "$category"

  Write-Output "=== Benchmarks completed for filter: $env:PARALLEL_ITEM ==="

# Run experiments in parallel
parallelize: true

experiments:
  - name: trace-0
    steps:
      - name: trace-0
        run: run_microbenchmarks
        repo: DataDog/dd-trace-dotnet
        baseline_branch: ""

        cpus: "0,0x3FFFF"
        parallelize:
          # 9 Benchmarks.Trace benchmarks on NUMA node 0, cores 0-17 (9 × 2 = 18 CPUs)
          items: >-
            *ActivityBenchmark*
            *AppSecBodyBenchmark*
            *AppSecWafBenchmark*
            *DbCommandBenchmark*
            *HttpClientBenchmark*
            *ILoggerBenchmark*
            *NLogBenchmark*
            *RedisBenchmark*
            *SpanBenchmark*
          cpus_per_item: 2

        env:
          BATCH_PREFIX: "trace-0"
          BENCHMARK_PROJECT: "Benchmarks.Trace"
        how_to_fetch_release: *how_to_fetch_release_build
        how_to_run_benchmarks: *how_to_run_benchmarks

  - name: trace-1
    steps:
      - name: trace-1
        run: run_microbenchmarks
        repo: DataDog/dd-trace-dotnet
        baseline_branch: ""

        cpus: "1,0x3FFFFF"
        parallelize:
          # 11 Benchmarks.Trace benchmarks on NUMA node 1, cores 0-21 (11 × 2 = 22 CPUs)
          items: >-
            *AgentWriterBenchmark*
            *AppSecEncoderBenchmark*
            *AspNetCoreBenchmark*
            *CharSliceBenchmark*
            *CIVisibilityProtocolWriterBenchmark*
            *ElasticsearchBenchmark*
            *GraphQLBenchmark*
            *Log4netBenchmark*
            *SerilogBenchmark*
            *StringAspectsBenchmark*
            *TraceAnnotationsBenchmark*
          cpus_per_item: 2

        env:
          BATCH_PREFIX: "trace-1"
          BENCHMARK_PROJECT: "Benchmarks.Trace"
        how_to_fetch_release: *how_to_fetch_release_wait
        how_to_run_benchmarks: *how_to_run_benchmarks

  - name: otel
    steps:
      - name: otel-instr-api
        run: run_microbenchmarks
        repo: DataDog/dd-trace-dotnet
        baseline_branch: ""

        cpus: "0,0xFC0000"
        parallelize:
          # OpenTelemetry InstrumentedApi benchmarks on NUMA node 0, cores 18-23 (3 × 2 = 6 CPUs)
          items: >-
            *ActivityBenchmark*
            *TelemetrySpanBenchmark*
            *TracerBenchmark*
          cpus_per_item: 2

        env:
          BATCH_PREFIX: "otel-instr-api"
          BENCHMARK_PROJECT: "Benchmarks.OpenTelemetry.InstrumentedApi"
          # Env vars below replicate what Nuke sets in GetBenchmarkProjectsWithSettings() for InstrumentedApi.
          # We set them here because bp-runner runs benchmarks directly, not via Nuke.
          DD_TRACE_OTEL_ENABLED: "true"
          DD_INSTRUMENTATION_TELEMETRY_ENABLED: "false"
          DD_INTERNAL_AGENT_STANDALONE_MODE_ENABLED: "true"
          DD_CIVISIBILITY_FORCE_AGENT_EVP_PROXY: "V4"
        how_to_fetch_release: *how_to_fetch_release_wait
        how_to_run_benchmarks: *how_to_run_benchmarks

      - name: otel-api
        run: run_microbenchmarks
        repo: DataDog/dd-trace-dotnet
        baseline_branch: ""

        cpus: "0,0xFC0000"
        parallelize:
          # OpenTelemetry Api benchmarks, same cores as otel-instr-api (runs sequentially after it).
          # Skipped on PRs since Nuke doesn't build them (see Build.cs GetBenchmarkProjectsWithSettings()).
          items: >-
            *ActivityBenchmark*
            *TelemetrySpanBenchmark*
            *TracerBenchmark*
          cpus_per_item: 2

        env:
          BATCH_PREFIX: "otel-api"
          BENCHMARK_PROJECT: "Benchmarks.OpenTelemetry.Api"
        how_to_fetch_release: *how_to_fetch_release_wait
        how_to_run_benchmarks: *how_to_run_benchmarks
