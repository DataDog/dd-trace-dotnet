# LLM Validation gate — compares the MR's AGENTS.md against the target branch and posts a
# pass/warn/fail report to the GitHub PR. See README.md in this directory for setup + assumptions.
#
# Wire it in by adding to the repo's top-level .gitlab-ci.yml:
#   include:
#     - local: .gitlab/llm-validation/llm-validation.yml

"llm validation":
  stage: .post
  # Reuse a Linux .NET 8 image from the dotnet pipeline; run.sh installs node + the claude CLI.
  # The report is always printed to the log + uploaded as an artifact (the #17900 model); posting to
  # the PR is optional (run.sh uses pr-commenter only if it's on PATH).
  image: "$LLMVAL_IMAGE"
  tags: ["arch:amd64"]
  rules:
    # dd-trace-dotnet GitLab pipelines are branch pipelines (no merge_request_event), like the BP jobs.
    # Manual during bring-up (it's a paid LLM run); run.sh self-skips if AGENTS.md is unchanged vs master.
    # To automate later: replace the manual rule with `when: on_success`.
    - if: '$CI_COMMIT_REF_NAME == "master"'
      when: never
    - when: manual
      allow_failure: true
  variables:
    # Debian-based .NET 8 SDK (amd64) — same family the repo's Linux Dockerfiles use. If ddbuild CI can't
    # pull external mcr, swap to the registry.ddbuild.io mirror (e.g. registry.ddbuild.io/images/mirror/dotnet/sdk:8.0).
    LLMVAL_IMAGE: "mcr.microsoft.com/dotnet/sdk:8.0"
    LLMVAL_PLATFORM_REF: "main"   # ref of DataDog/llm-validation-platform to build the CLI from
    LLMVAL_RUNS: "3"              # repeats per case (more = tighter win-rate CI)
    LLMVAL_MAX_CASES: "1"         # cheap first run; raise / remove once it's working
  script:
    - bash .gitlab/llm-validation/run.sh
  artifacts:
    when: always
    paths:
      - results.json
      - report.md
      - details.json
    expire_in: 1 month
