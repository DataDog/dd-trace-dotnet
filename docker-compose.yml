services:
  # ARM64 dependencies
  localstack_arm64:
    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
    environment:
      - SERVICES=sns,sqs,kinesis,dynamodb,events,s3,stepfunctions,lambda
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"

  elasticsearch7_arm64:
    image: elasticsearch:7.10.1@sha256:7cd88158f6ac75d43b447fdd98c4eb69483fa7bf1be5616a85fe556262dc864a
    ports:
    - "9200"
    - "9300"
    environment:
    - discovery.type=single-node
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  mongo_arm64:
    image: mongo:5.0.31@sha256:54bcd8da3ea5eec561b68c605046c55c6b304387dc4c2bf5b3a5f5064fbb7495
    ports:
      - "27017"
    command: mongod

  mysql_arm64:
    image: mysql/mysql-server:8.0@sha256:d6c8301b7834c5b9c2b733b10b7e630f441af7bc917c74dba379f24eeeb6a313
    environment:
    - MYSQL_DATABASE=world
    - MYSQL_ROOT_PASSWORD=mysqldb
    - MYSQL_USER=mysqldb
    - MYSQL_PASSWORD=mysqldb
    ports:
    - "3306"

  postgres_arm64:
    image: postgres:10.5-alpine@sha256:295a08ddd9efa1612c46033f0b96c3976f80f49c7ce29e05916b0af557806117
    environment:
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_USER=postgres
    - POSTGRES_DB=postgres
    ports:
    - "5432"

  rabbitmq_arm64:
    image: rabbitmq:3-management@sha256:e582c0bc7766f3342496d8485efb5a1df782b5ce3886ad017e2eaae442311f69
    command: rabbitmq-server
    ports:
      - "5672"
      - "15672"

  servicestackredis_arm64:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    command: redis-server --bind 0.0.0.0
    ports:
    - "6379"

  sqledge_arm64:
    image: mcr.microsoft.com/azure-sql-edge:latest@sha256:902628a8be89e35dfb7895ca31d602974c7bafde4d583a0d0873844feb1c42cf
    ports:
    - "1433"
    environment:
    - ACCEPT_EULA=Y
    - SA_PASSWORD=Strong!Passw0rd

  cosmosdb-emulator_arm64:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview@sha256:54d7bc334494c50cea867c270880671a7db080626a9732832b34c0d69342f9b0
    command: ["--protocol", "https"]

  stackexchangeredis_arm64:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    hostname: stackexchangeredis_arm64
    command: redis-server --bind 0.0.0.0
    ports:
    - "6379"

  stackexchangeredis_arm64-replica:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    hostname: stackexchangeredis_arm64-replica
    command: redis-server --bind 0.0.0.0 --slaveof stackexchangeredis_arm64 6379
    ports:
    - "127.0.0.1:6390:6379"

  stackexchangeredis_arm64-single:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    hostname: stackexchangeredis_arm64-single
    command: redis-server --bind 0.0.0.0
    ports:
    - "127.0.0.1:6391:6379"

# Dependencies
  localstack:
    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
    profiles: ["group2"]
    environment:
      - SERVICES=sns,sqs,kinesis,dynamodb,events,s3,stepfunctions,lambda
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    volumes:
      - "./.localstack:/tmp"

  rabbitmq:
    image: rabbitmq:3-management@sha256:e582c0bc7766f3342496d8485efb5a1df782b5ce3886ad017e2eaae442311f69
    profiles: ["group1"]
    command: rabbitmq-server
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"

  servicestackredis:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    profiles: ["group1"]
    command: redis-server --bind 0.0.0.0
    ports:
    - "127.0.0.1:6379:6379"

  stackexchangeredis:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    profiles: ["group1"]
    hostname: stackexchangeredis
    command: redis-server --bind 0.0.0.0
    ports:
    - "127.0.0.1:6389:6379"

  stackexchangeredis-replica:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    profiles: ["group1"]
    hostname: stackexchangeredis-replica
    command: redis-server --bind 0.0.0.0 --slaveof stackexchangeredis 6379
    ports:
    - "127.0.0.1:6390:6379"

  stackexchangeredis-single:
    image: redis:4-alpine@sha256:aaf7c123077a5e45ab2328b5ef7e201b5720616efac498d55e65a7afbb96ae20
    profiles: ["group1"]
    hostname: stackexchangeredis-single
    command: redis-server --bind 0.0.0.0
    ports:
    - "127.0.0.1:6391:6379"

  mongo:
    image: mongo:5.0.31@sha256:54bcd8da3ea5eec561b68c605046c55c6b304387dc4c2bf5b3a5f5064fbb7495
    profiles: ["group2"]
    ports:
      - "127.0.0.1:27017:27017"
    command: mongod

  couchbase:
    image: bentonam/couchbase-docker:community-5.0.1@sha256:847440848c80b95d82b12c8834856a14b1bfde854bd03b6acd0f9d0ac3484c63
    profiles: ["group1"]
    ports:
      - "8091-8094:8091-8094"
      - "11210:11210"

  elasticsearch7:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.14.1@sha256:2dcd2f31e246a8b13995ba24922da2edc3d88e65532ff301d0b92cb1be358af5
    profiles: ["group2"]
    ports:
    - "127.0.0.1:9210:9200"
    - "127.0.0.1:9310:9300"
    environment:
    - discovery.type=single-node
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  elasticsearch6:
    image: docker.elastic.co/elasticsearch/elasticsearch:6.4.2@sha256:3da16b2f3b1d4e151c44f1a54f4f29d8be64884a64504b24ebcbdb4e14c80aa1
    profiles: ["group2"]
    ports:
    - "127.0.0.1:9200:9200"
    - "127.0.0.1:9300:9300"
    environment:
    - discovery.type=single-node
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  elasticsearch5:
    image: docker.elastic.co/elasticsearch/elasticsearch:5.6.16@sha256:9ffbb6d9d0f383d70b8249117e5758dcf9c628a5ab3a78fd6a520ef1d0f416a2
    profiles: ["group2"]
    ports:
    - "127.0.0.1:9205:9200"
    - "127.0.0.1:9305:9300"
    environment:
    - discovery.type=single-node
    - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

  postgres:
    image: postgres:10.5-alpine@sha256:295a08ddd9efa1612c46033f0b96c3976f80f49c7ce29e05916b0af557806117
    profiles: ["group1"]
    environment:
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_USER=postgres
    - POSTGRES_DB=postgres
    ports:
    - "127.0.0.1:5432:5432"

  mysql:
    image: mysql/mysql-server:8.0@sha256:d6c8301b7834c5b9c2b733b10b7e630f441af7bc917c74dba379f24eeeb6a313
    profiles: ["group1"]
    environment:
    - MYSQL_DATABASE=world
    - MYSQL_ROOT_PASSWORD=mysqldb
    - MYSQL_USER=mysqldb
    - MYSQL_PASSWORD=mysqldb
    ports:
    - "127.0.0.1:3307:3306"

  mysql57:
    image: mysql/mysql-server:5.7@sha256:1178cdd375f758968cd834ac4057bae41307e64b7c69a9e145896e7b11f48064
    profiles: ["group1"]
    environment:
    - MYSQL_DATABASE=world
    - MYSQL_ROOT_PASSWORD=mysqldb
    - MYSQL_USER=mysqldb
    - MYSQL_PASSWORD=mysqldb
    ports:
    - "127.0.0.1:3407:3306"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:latest@sha256:2cd0aec4a3bfc3cf9205bed3f7922f4c6208f7c767dc62edcee308d0fd7d56d0
    profiles: ["group1"]
    ports:
    - "127.0.0.1:1433:1433"
    environment:
    - ACCEPT_EULA=Y
    - SA_PASSWORD=Strong!Passw0rd

  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest@sha256:902628a8be89e35dfb7895ca31d602974c7bafde4d583a0d0873844feb1c42cf
    profiles: ["group2"]
    environment:
    - ACCEPT_EULA=Y
    - MSSQL_SA_PASSWORD=Strong!Passw0rd

  azureservicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:1.1.2@sha256:353913ece3d9124cebd40f4b91d00dd197846b8cf86eae9a4790698709c64a1d
    profiles: ["group2"]
    depends_on:
      - sqledge
    ports:
      - "127.0.0.1:5672:5672"
    environment:
      - ACCEPT_EULA=Y
      - SQL_SERVER=sqledge:1433
      - MSSQL_SA_PASSWORD=Strong!Passw0rd
    volumes:
      - ./docker/servicebus-emulator-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest@sha256:647c63a91102a9d8e8000aab803436e1fc85fbb285e7ce830a82ee5d6661cf37
    profiles: ["group2"]
    hostname: azurite
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  azure-eventhubs-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest@sha256:2c8e0d4dd93a5fc078df2721eeb3e211442d555d61293ac3972df931c6d9333a
    profiles: ["group2"]
    depends_on:
      - azurite
    ports:
      - "127.0.0.1:5673:5672"
    environment:
      - ACCEPT_EULA=Y
      - BLOB_SERVER=azurite
      - METADATA_SERVER=azurite
    volumes:
      - ./docker/eventhubs-emulator-config.json:/Eventhubs_Emulator/ConfigFiles/Config.json:ro

  azure-eventgrid-emulator:
    image: workleap/eventgridemulator:0.6.37@sha256:a366e9bf0c73979311654d98f4cb91f85e35cddd8333821f5a5029692b6002bb
    profiles: ["group2"]
    ports:
      - "127.0.0.1:6500:6500"
    volumes:
      - ./docker/eventgrid-emulator-config.json:/app/appsettings.json:ro
    environment:
      # Override the topic's subscriber webhook (ASP.NET array config). The Azure Functions host that
      # receives the pushed event is reachable at a different host depending on where it runs: inside the
      # IntegrationTests container in CI (EVENTGRID_WEBHOOK_HOST=integrationtests) vs on the Docker host
      # locally (host.docker.internal). The emulator adds the aeg-event-type header and forwards the CloudEvent.
      - Topics__samples-azure-functions-eventgrid-topic__0=http://${EVENTGRID_WEBHOOK_HOST:-host.docker.internal}:7071/runtime/webhooks/eventgrid?functionName=EventGridTrigger
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cosmosdb-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview@sha256:54d7bc334494c50cea867c270880671a7db080626a9732832b34c0d69342f9b0
    profiles: ["group2"]
    command: ["--protocol", "https"]

  # this docker image doesn't work on arm64. It can still be tested on Mac using colima, see https://github.com/abiosoft/colima
  oracle:
    image: container-registry.oracle.com/database/free:latest
    ports:
      - "127.0.0.1:1521:1521"
    environment:
      - ORACLE_PWD=testpassword

  wcfservice:
    image: mcr.microsoft.com/dotnet/framework/wcf:4.8
    ports:
    - "127.0.0.1:8585:8585"

  # See https://github.com/confluentinc/cp-all-in-one/blob/6.1.1-post/cp-all-in-one/docker-compose.yml
  # For original definitions
  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:6.1.1@sha256:a7c0a20dce46a705300cd464e511e9c70ac55ec7e62c024867470a19ce210563
    profiles: ["group1"]
    hostname: kafka-zookeeper
    container_name: kafka-zookeeper
    ports:
      - "2181:2181"
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-broker:
    image: confluentinc/cp-server:6.1.1@sha256:4a1ff92bd03e361759ba339c97b4c4b7dbb52d7cea478dda22d034261a8991e4
    profiles: ["group1"]
    hostname: kafka-broker
    container_name: kafka-broker
    depends_on:
      - kafka-zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'kafka-zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_METRIC_REPORTERS: io.confluent.metrics.reporter.ConfluentMetricsReporter
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: kafka-broker:29092
      CONFLUENT_METRICS_REPORTER_TOPIC_REPLICAS: 1
      CONFLUENT_METRICS_ENABLE: 'true'
      CONFLUENT_SUPPORT_CUSTOMER_ID: 'anonymous'

  openldap:
    image: osixia/openldap:latest@sha256:3f68751292b43564a2586fc29fb7337573e2dad692b92d4e78e49ad5c22e567b
    ports:
      - "389:369"
      - "636:636"
    hostname: openldap-server
    environment:
      LDAP_ORGANISATION: "Datadog"
      LDAP_DOMAIN: "dd-trace-dotnet.com"
      LDAP_ADMIN_PASSWORD: "Passw0rd"
      LDAP_BASE_DN: "dc=dd-trace-dotnet,dc=com"

  StartDependencies.Profiler:
    image: andrewlock/wait-for-dependencies:latest@sha256:5d87561de8c019c3954298f707c1f6d7087f620a1ce36c3ec38cdfbc1ec4066e
    depends_on:
      - openldap
    environment:
      - TIMEOUT_LENGTH=120
    command: openldap-server:389

  ProfilerIntegrationTests:
    build:
      context: ./tracer/build/_build/
      dockerfile: docker/${baseImage:-debian}.dockerfile
      args:
        - DOTNETSDK_VERSION=${dotnetCoreSdkLatestVersion:-10.0.100}
    image: dd-trace-dotnet/${baseImage:-debian}-tester:${dotnetCoreSdkLatestVersion:-10.0.100}
    command: dotnet /build/bin/Debug/_build.dll BuildAndRunProfilerIntegrationTests
    volumes:
      - ./:/project
    cap_add:
      - SYS_PTRACE
    environment:
      - NugetPackageDirectory=/project/${relativeNugetPackageDirectory:-packages}
      - artifacts=/project/${relativeArtifacts:-artifacts/output}
      - framework=${framework:-netcoreapp3.1}
      - baseImage=${baseImage:-default}
      - DD_CLR_ENABLE_NGEN=${DD_CLR_ENABLE_NGEN:-1}
      - IncludeMinorPackageVersions=${IncludeMinorPackageVersions:-false}
      - enable_crash_dumps=${enable_crash_dumps:-true}
      - DD_LOGGER_DD_API_KEY
      - DD_LOGGER_DD_TRACE_LOG_DIRECTORY=/project/artifacts/build_data/infra_logs
      - DD_LOGGER_DD_SERVICE
      - DD_LOGGER_DD_ENV
      - DD_LOGGER_ENABLED
      - DD_LOGGER_TF_BUILD=${TF_BUILD:-}
      - DD_LOGGER_BUILD_BUILDID
      - DD_LOGGER_BUILD_DEFINITIONNAME
      - DD_LOGGER_BUILD_SOURCESDIRECTORY
      - DD_LOGGER_BUILD_REPOSITORY_URI
      - DD_LOGGER_BUILD_SOURCEVERSION
      - DD_LOGGER_BUILD_SOURCEBRANCH
      - DD_LOGGER_BUILD_SOURCEBRANCHNAME
      - DD_LOGGER_BUILD_SOURCEVERSIONMESSAGE
      - DD_LOGGER_BUILD_REQUESTEDFORID
      - DD_LOGGER_BUILD_REQUESTEDFOREMAIL
      - DD_LOGGER_SYSTEM_TEAMFOUNDATIONSERVERURI
      - DD_LOGGER_SYSTEM_TEAMPROJECTID
      - DD_LOGGER_SYSTEM_STAGEDISPLAYNAME
      - DD_LOGGER_SYSTEM_JOBDISPLAYNAME
      - DD_LOGGER_SYSTEM_JOBID
      - DD_LOGGER_SYSTEM_TASKINSTANCEID=${SYSTEM_TASKINSTANCEID:-}
      - DD_LOGGER_SYSTEM_PULLREQUEST_SOURCEREPOSITORYURI
      - DD_LOGGER_SYSTEM_PULLREQUEST_SOURCECOMMITID
      - DD_LOGGER_SYSTEM_PULLREQUEST_SOURCEBRANCH
      - DD_LOGGER_DD_TAGS
      - LDAP_SERVER=openldap-server:389
    hostname: integrationtests
    depends_on:
      - openldap

  IntegrationTests:
    build:
      context: ./tracer/build/_build/
      dockerfile: docker/${baseImage:-debian}.dockerfile
      args:
        - DOTNETSDK_VERSION=${dotnetCoreSdkLatestVersion:-10.0.100}
    image: dd-trace-dotnet/${baseImage:-debian}-tester:${dotnetCoreSdkLatestVersion:-10.0.100}
    command: dotnet /build/bin/Debug/_build.dll RunIntegrationTests
    volumes:
      - ./:/project
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - SYS_PTRACE
    environment:
      - NugetPackageDirectory=/project/${relativeNugetPackageDirectory:-packages}
      - artifacts=/project/${relativeArtifacts:-artifacts/output}
      - framework=${framework:-netcoreapp3.1}
      - Filter=${Filter:- } #optional
      - SampleName=${SampleName:- } #optional
      - baseImage=${baseImage:-default}
      - CodeCoverageEnabled=${CodeCoverageEnabled:-false}
      - DD_CLR_ENABLE_NGEN=${DD_CLR_ENABLE_NGEN:-1}
      - TestAllPackageVersions=${TestAllPackageVersions:-true}
      - IncludeMinorPackageVersions=${IncludeMinorPackageVersions:-false}
      - enable_crash_dumps=${enable_crash_dumps:-true}
      - Verify_DisableClipboard=true
      - DiffEngine_Disabled=true
      - IncludeAllTestFrameworks
      - MONGO_HOST=mongo
      - SERVICESTACK_REDIS_HOST=servicestackredis:6379
      - STACKEXCHANGE_REDIS_HOST=stackexchangeredis:6379,stackexchangeredis-replica:6379
      - STACKEXCHANGE_REDIS_SINGLE_HOST=stackexchangeredis-single:6379
      - ELASTICSEARCH7_HOST=elasticsearch7:9200
      - ELASTICSEARCH6_HOST=elasticsearch6:9200
      - ELASTICSEARCH5_HOST=elasticsearch5:9200
      - SQLSERVER_CONNECTION_STRING=Server=sqlserver;User=sa;Password=Strong!Passw0rd;TrustServerCertificate=true
      - POSTGRES_HOST=postgres
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL57_HOST=mysql57
      - MYSQL57_PORT=3306
      - RABBITMQ_HOST=rabbitmq
      - KAFKA_BROKER_HOST=kafka-broker:29092
      - AWS_SDK_HOST=localstack:4566
      - ORACLE_HOST=oracle
      - COUCHBASE_HOST=couchbase
      - COUCHBASE_PORT=8091
      - ASB_CONNECTION_STRING=Endpoint=sb://azureservicebus-emulator:5672;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - EVENTHUBS_CONNECTION_STRING=Endpoint=sb://azure-eventhubs-emulator:5672;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - EVENTGRID_TOPIC_ENDPOINT=http://azure-eventgrid-emulator:6500/samples-eventgrid-topic/api/events
      - EVENTGRID_AZURE_FUNCTIONS_TOPIC_ENDPOINT=http://azure-eventgrid-emulator:6500/samples-azure-functions-eventgrid-topic/api/events
      - COSMOSDB_ENDPOINT=https://cosmosdb-emulator:8081
      - TEST_AGENT_HOST=test-agent
      - CONTAINER_HOSTNAME=http://integrationtests
      - TESTCONTAINERS_RYUK_DISABLED
      - DD_LOGGER_DD_API_KEY
      - DD_LOGGER_DD_TRACE_LOG_DIRECTORY=/project/artifacts/build_data/infra_logs
      - DD_LOGGER_DD_SERVICE
      - DD_LOGGER_DD_ENV
      - DD_LOGGER_ENABLED
      - DD_LOGGER_TF_BUILD=${TF_BUILD:-}
      - DD_LOGGER_BUILD_BUILDID
      - DD_LOGGER_BUILD_DEFINITIONNAME
      - DD_LOGGER_BUILD_SOURCESDIRECTORY
      - DD_LOGGER_BUILD_REPOSITORY_URI
      - DD_LOGGER_BUILD_SOURCEVERSION
      - DD_LOGGER_BUILD_SOURCEBRANCH
      - DD_LOGGER_BUILD_SOURCEBRANCHNAME
      - DD_LOGGER_BUILD_SOURCEVERSIONMESSAGE
      - DD_LOGGER_BUILD_REQUESTEDFORID
      - DD_LOGGER_BUILD_REQUESTEDFOREMAIL
      - DD_LOGGER_SYSTEM_TEAMFOUNDATIONSERVERURI
      - DD_LOGGER_SYSTEM_TEAMPROJECTID
      - DD_LOGGER_SYSTEM_STAGEDISPLAYNAME
      - DD_LOGGER_SYSTEM_JOBDISPLAYNAME
      - DD_LOGGER_SYSTEM_JOBID
      - DD_LOGGER_SYSTEM_TASKINSTANCEID=${SYSTEM_TASKINSTANCEID:-}
      - DD_LOGGER_SYSTEM_PULLREQUEST_SOURCEREPOSITORYURI
